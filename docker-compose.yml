version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: servicedesk_db
    environment:
      POSTGRES_USER: sd_user
      POSTGRES_PASSWORD: sd_pass
      POSTGRES_DB: servicedesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sd_user -d servicedesk" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servicedesk_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sd_user:sd_pass@db:5432/servicedesk
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    container_name: servicedesk_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  postgres_data:
