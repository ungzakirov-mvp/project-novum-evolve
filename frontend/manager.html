<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Service Desk</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/agent.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .manager-layout {
            display: grid;
            grid-template-columns: 80px 1fr;
            height: 100vh;
            background: var(--bg-primary);
        }

        .m-container {
            padding: 2.5rem;
            overflow-y: auto;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0.5rem 0;
            color: white;
        }

        .kpi-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .trend-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .team-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .team-table th {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .team-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .export-box {
            margin-top: auto;
            padding: 1.5rem;
            border-top: 1px solid var(--glass-border);
        }
    </style>
</head>

<body>
    <div class="manager-layout">
        <nav class="sidebar">
            <div class="nav-icon active" title="Dashboard">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="nav-icon" title="Reports">
                <i class="fa-solid fa-file-invoice"></i>
            </div>

            <div class="user-avatar" id="currentUserAvatar" style="margin-top: auto">M</div>
            <div class="nav-icon" id="logoutBtn" title="Logout" style="margin-top: 1rem">
                <i class="fa-solid fa-right-from-bracket"></i>
            </div>
        </nav>

        <main class="m-container">
            <header style="margin-bottom: 2rem">
                <h1>Управление и Метрики</h1>
                <p style="color: var(--text-muted)">Общая эффективность службы поддержки</p>
            </header>

            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-label">Всего заявок (30д)</div>
                    <div class="kpi-value" id="totalTickets">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">SLA Compliance</div>
                    <div class="kpi-value" id="slaRate">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Ср. время решения</div>
                    <div class="kpi-value" id="avgResolution">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Активных агентов</div>
                    <div class="kpi-value" id="activeAgents">-</div>
                </div>
            </div>

            <div class="trend-grid">
                <div class="stat-card">
                    <h3>Тренд объемов</h3>
                    <div id="volumeChart" class="chart-container" style="height: 350px">
                        <div class="loading-placeholder">Загрузка трендов...</div>
                    </div>
                </div>

                <div class="stat-card">
                    <h3>Эффективность команды</h3>
                    <table class="team-table">
                        <thead>
                            <tr>
                                <th>Агент</th>
                                <th>Решено</th>
                                <th>SLA</th>
                            </tr>
                        </thead>
                        <tbody id="teamBody">
                            <tr>
                                <td colspan="3" style="text-align:center">Загрузка данных...</td>
                            </tr>
                        </tbody>
                    </table>

                    <button class="btn btn-secondary btn-small" id="exportBtn" style="margin-top: 2rem; width: 100%">
                        <i class="fa-solid fa-download"></i> Экспорт данных (CSV)
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js?v=1.0.1"></script>
    <script src="js/manager.js?v=1.0.1"></script>
</body>

</html>
